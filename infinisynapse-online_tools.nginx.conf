# =============================================================================
# InfiniSynapse 在线工具 —— Nginx 反向代理配置
#
# 作用:把 https://infinisynapse.com/online_tools 及其下所有路径,
#       原样(保留 /online_tools 前缀)转发到 Vercel 上的工具部署。
#       访客和 Google 看到的都是 infinisynapse.com 下的页面,地址栏不跳转、
#       不暴露 vercel.app,SEO 权重归属主域。
#
# 安装:把下面的 location 块整段,粘贴进 infinisynapse.com 对应的
#       server { ... }（监听 443 的那个)里,与现有的 location / 平级。
#       然后执行:  nginx -t   测试通过后   nginx -s reload
#
# 说明:无需改 DNS;无需开新端口;无需在客户服务器上跑任何程序。
#       现有的 infinisynapse.com/tools（Agent Tools）等路径不受影响。
# =============================================================================

location ^~ /online_tools {
    # —— Vercel 部署地址(工具项目),如有变更只改这一处 ——
    proxy_pass https://infinisynapse-online-tools.vercel.app;

    # Vercel 按 Host 头路由项目,且 HTTPS 回源必须带 SNI,这两行缺一不可
    proxy_set_header Host infinisynapse-online-tools.vercel.app;
    proxy_ssl_server_name on;

    # 把 Vercel 可能返回的 301/308 跳转地址改回主域,避免暴露 vercel.app
    proxy_redirect https://infinisynapse-online-tools.vercel.app/ /;

    # 传递真实访客信息(db 兼容性检测的 SSRF 防护与日志会用到)
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP         $remote_addr;

    # db 兼容性检测页有 POST 请求(/online_tools/api/check-connection)
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    # 回源握手/读取超时,给数据库连通性测试留足时间
    proxy_connect_timeout 15s;
    proxy_read_timeout    30s;
}
